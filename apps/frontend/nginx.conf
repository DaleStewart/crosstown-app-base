server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Upstream is Azure Container Apps over HTTPS — must send SNI and a
    # matching Host header, otherwise ACA's front door resets the TLS
    # handshake and nginx returns 502. ORCHESTRATOR_HOST is the bare hostname
    # (no scheme) derived from ORCHESTRATOR_URL by the entrypoint.
    # Explicit health rewrite: GET /api/health -> orchestrator /health
    # Must precede the catch-all /api/ block (nginx evaluates `=` exact-match
    # locations before prefix matches). Orchestrator route is /health (NOT
    # /healthz; see apps/orchestrator/main.py:38). Returns JSON
    # {"status":"ok|degraded","service":"orchestrator"}.
    location = /api/health {
        proxy_pass ${ORCHESTRATOR_URL}/health;
        proxy_http_version 1.1;
        proxy_set_header Host ${ORCHESTRATOR_HOST};
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_name ${ORCHESTRATOR_HOST};
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    location /api/ {
        proxy_pass ${ORCHESTRATOR_URL};
        proxy_http_version 1.1;
        proxy_set_header Host ${ORCHESTRATOR_HOST};
        proxy_ssl_server_name on;
        proxy_ssl_name ${ORCHESTRATOR_HOST};
    }

    location /ws/ {
        proxy_pass ${ORCHESTRATOR_URL};
        proxy_http_version 1.1;
        proxy_set_header Host ${ORCHESTRATOR_HOST};
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_ssl_server_name on;
        proxy_ssl_name ${ORCHESTRATOR_HOST};
        proxy_read_timeout 3600;
    }

    location / {
        try_files $uri /index.html;
    }
}
