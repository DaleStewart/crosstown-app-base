# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: mta-ai-hackathon
metadata:
  template: mta-ai-hackathon@0.1.0

infra:
  provider: bicep
  path: infra
  module: main

services:
  log-analyst:
    project: ./apps/log_analyst
    host: containerapp
    language: python
    docker:
      path: Dockerfile
      context: .
  orchestrator:
    project: ./apps/orchestrator
    host: containerapp
    language: python
    docker:
      path: Dockerfile
      context: .
  frontend:
    project: ./apps/frontend
    host: containerapp
    language: ts
    docker:
      path: Dockerfile
      context: .

# Runs the smoke gate after every `azd deploy`. Fails the deploy if the
# frontend isn't serving the Crosstown app, /api/health is broken, or any
# prompted /api/turn call returns empty. FR-009 enforcement: deploy-time
# smoke must fail loud so a broken build never silently reaches the demo.
hooks:
  postdeploy:
    posix:
      shell: sh
      run: bash scripts/smoke-test.sh "$FRONTEND_URL"
      interactive: false
    windows:
      shell: pwsh
      run: pwsh -NoProfile -File scripts/smoke-test.ps1 -FrontendUrl $env:FRONTEND_URL
      interactive: false
  postprovision:
    windows:
      shell: pwsh
      run: ./scripts/load_search_index.ps1
      continueOnError: true
      interactive: false
    posix:
      shell: sh
      run: ./scripts/load_search_index.sh
      continueOnError: true
      interactive: false
